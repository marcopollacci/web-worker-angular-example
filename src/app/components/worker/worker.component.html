@let disabled = disableButton();

<header>
  <a routerLink="/">← Back</a>
  <h1>⚙️ Web Worker</h1>
  <p>
    Heavy computation runs in a dedicated worker thread — UI stays responsive
  </p>
</header>

<section>
  <div>
    <button [disabled]="disabled" (click)="startHeavyWorkInWorker()">
      {{ disabled ? "Running…" : "Start Heavy Work" }}
    </button>
    <span [attr.data-active]="disabled">
      @if (disabled) {
        Worker is running…
      } @else {
        Idle
      }
    </span>
  </div>

  <hr />

  <div>
    <p>Try clicking while the worker runs — notice no UI freeze</p>
    <button (click)="incrementCounter()">Increment Counter</button>
    <span>{{ counter() }}</span>
  </div>
</section>
